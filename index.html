<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawCon — Global Attendee Directory</title>
<meta name="description" content="Browse 2,751 ClawCon attendees across 7 cities. Search by name, bio, company. Filter by founders, engineers, VCs, AI/ML, crypto and more.">
<meta property="og:title" content="ClawCon — Global Attendee Directory">
<meta property="og:description" content="2,751 attendees across NYC, Austin, Tel Aviv, Miami, London, Guadalajara & Rio. Search, filter, and connect.">
<meta property="og:image" content="https://owencoonahan.github.io/clawcon-directory/og-image.jpg">
<meta property="og:url" content="https://owencoonahan.github.io/clawcon-directory/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ClawCon — Global Attendee Directory">
<meta name="twitter:description" content="2,751 attendees across 7 cities. Search, filter, connect.">
<meta name="twitter:image" content="https://owencoonahan.github.io/clawcon-directory/og-image.jpg">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafafa; --bg-card: white; --bg-hover: #f9f9f9; --bg-thead: #f9f9f9;
  --text: #111; --text-secondary: #666; --text-muted: #888; --text-bio: #555;
  --border: #e5e5e5; --border-light: #f0f0f0; --badge-bg: #f0f0f0; --badge-text: #666;
  --input-bg: white; --active-bg: #111; --active-text: white;
}
html.dark {
  --bg: #0a0a0a; --bg-card: #141414; --bg-hover: #1a1a1a; --bg-thead: #111;
  --text: #e5e5e5; --text-secondary: #999; --text-muted: #777; --text-bio: #aaa;
  --border: #2a2a2a; --border-light: #1e1e1e; --badge-bg: #222; --badge-text: #999;
  --input-bg: #141414; --active-bg: #e5e5e5; --active-text: #0a0a0a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Geist', -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
.container { max-width: 1280px; margin: 0 auto; padding: 24px; }
header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
header p { color: var(--text-secondary); margin-top: 6px; font-size: 15px; }
.city-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid var(--border); overflow-x: auto; }
.city-tab { padding: 12px 20px; font-size: 14px; font-family: 'Geist', sans-serif; cursor: pointer; border: none; background: none; color: var(--text-muted); font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; white-space: nowrap; }
.city-tab:hover { color: var(--text); }
.city-tab.active { color: var(--text); border-bottom-color: var(--text); }
.city-tab .count { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-muted); margin-left: 6px; }
.city-tab.active .count { color: var(--text-secondary); }
.stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; }
.stat-num { font-size: 22px; font-weight: 700; font-family: 'Geist Mono', monospace; }
.stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search { flex: 1; min-width: 250px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'Geist', sans-serif; outline: none; background: var(--input-bg); color: var(--text); }
.search:focus { border-color: var(--text); }
.filter-btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: 'Geist', sans-serif; cursor: pointer; background: var(--bg-card); color: var(--text); transition: all 0.15s; }
.filter-btn:hover { border-color: var(--text); }
.filter-btn.active { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }
.sort-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: 'Geist', sans-serif; background: var(--input-bg); color: var(--text); cursor: pointer; }
.result-count { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; font-family: 'Geist Mono', monospace; }
table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
thead { background: var(--bg-thead); }
th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); user-select: none; }
td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border-light); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover { background: var(--bg-hover); }
.name-cell { font-weight: 500; white-space: nowrap; }
.bio-cell { color: var(--text-bio); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.city-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; background: var(--badge-bg); color: var(--badge-text); margin-left: 6px; }
.social-links { display: flex; gap: 5px; }
.social-links a { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 4px; border: 1px solid var(--border); color: var(--text-bio); text-decoration: none; font-size: 11px; transition: all 0.15s; }
.social-links a:hover { border-color: var(--text); color: var(--text); }
.followers { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--text-muted); }
.verified { color: #1d9bf0; font-size: 11px; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 500; margin: 1px 2px; }
.tag-founder { background: #f0f7ff; color: #0066cc; }
.tag-engineer { background: #f0fff4; color: #008844; }
.tag-vc { background: #fef3f0; color: #cc4400; }
.tag-ai { background: #f5f0ff; color: #7c3aed; }
.tag-crypto { background: #fffbeb; color: #b45309; }
.tag-student { background: #f0fdf4; color: #16a34a; }
.tag-pm { background: #fef2f2; color: #dc2626; }
.tag-marketing { background: #fdf2f8; color: #db2777; }
.tag-research { background: #f0f9ff; color: #0369a1; }
.tag-designer { background: #f5f0ff; color: #6633cc; }
html.dark .tag-founder { background: #0d2240; color: #5b9cf0; }
html.dark .tag-engineer { background: #0a2618; color: #4ade80; }
html.dark .tag-vc { background: #2a1508; color: #f59e0b; }
html.dark .tag-ai { background: #1a0d30; color: #a78bfa; }
html.dark .tag-crypto { background: #2a1d08; color: #fbbf24; }
html.dark .tag-student { background: #0a2618; color: #4ade80; }
html.dark .tag-pm { background: #2a0808; color: #f87171; }
html.dark .tag-marketing { background: #2a0820; color: #f472b6; }
html.dark .tag-research { background: #082030; color: #38bdf8; }
html.dark .tag-designer { background: #1a0d30; color: #a78bfa; }
.theme-toggle { position: fixed; top: 16px; right: 16px; z-index: 100; width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
.theme-toggle:hover { border-color: var(--text); }
.tag-student { background: #fff8f0; color: #996600; }
.tag-pm { background: #f0ffff; color: #008888; }
.empty { text-align: center; padding: 40px; color: #888; }
.loading { text-align: center; padding: 40px; color: #888; }
@media (max-width: 768px) {
  .container { padding: 16px; }
  header h1 { font-size: 22px; }
  .bio-cell { max-width: 150px; }
  td, th { padding: 8px 10px; }
  .city-tab { padding: 10px 14px; font-size: 13px; }
}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
<div class="container">
  <header>
    <h1>ClawCon — Global Attendee Directory</h1>
    <p>Built by <a href="https://x.com/OwenCoonahan" target="_blank" style="color:var(--text);text-decoration:none;border-bottom:1px solid var(--border);font-weight:500;">Owen Coonahan</a></p>
  </header>
  
  <div class="city-tabs" id="cityTabs"></div>
  
  <div class="stats" id="stats"></div>
  
  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search by name, bio, company, location...">
    <select class="sort-select" id="sort">
      <option value="name">Sort: Name A→Z</option>
      <option value="followers">Sort: Followers ↓</option>
    </select>
    <button class="filter-btn" id="downloadCsv" style="font-weight:500;">⬇ Download CSV</button>
  </div>
  
  <div class="controls" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="has-twitter">X/Twitter</button>
    <button class="filter-btn" data-filter="has-linkedin">LinkedIn</button>
    <button class="filter-btn" data-filter="has-bio">Has Bio</button>
    <button class="filter-btn" data-filter="verified">Verified ✓</button>
    <button class="filter-btn" data-filter="founder">Founders</button>
    <button class="filter-btn" data-filter="engineer">Engineers</button>
    <button class="filter-btn" data-filter="vc">VCs</button>
    <button class="filter-btn" data-filter="designer">Designers</button>
    <button class="filter-btn" data-filter="pm">PMs</button>
    <button class="filter-btn" data-filter="ai">AI/ML</button>
    <button class="filter-btn" data-filter="crypto">Crypto/Web3</button>
    <button class="filter-btn" data-filter="student">Students</button>
  </div>
  
  <div class="result-count" id="count"></div>
  
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Bio / Headline</th>
        <th>Tags</th>
        <th>Links</th>
        <th>Followers</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  
  <div class="empty" id="empty" style="display:none;">No attendees match your search.</div>
  <div class="loading" id="loading">Loading attendee data...</div>
</div>

<script>
const CITIES = [
  { id: 'all', name: 'All Cities', file: null },
  { id: 'nyc', name: 'NYC', file: 'data-nyc.json', date: 'Mar 5' },
  { id: 'austin', name: 'Austin', file: 'data-austin.json', date: 'Mar 12' },
  { id: 'telaviv', name: 'Tel Aviv', file: 'data-telaviv.json', date: 'Mar 18' },
  { id: 'miami', name: 'Miami', file: 'data-miami.json', date: 'Mar 25' },
  { id: 'london', name: 'London', file: 'data-london.json', date: 'Apr 8' },
  { id: 'guadalajara', name: 'Guadalajara', file: 'data-guadalajara.json', date: 'Apr 18' },
  { id: 'rio', name: 'Rio', file: 'data-rio.json', date: 'Apr 29' },
];

let cityData = {};
let currentCity = 'all';
let currentFilter = 'all';
let currentSort = 'name';
let currentSearch = '';

async function loadAllData() {
  const promises = CITIES.filter(c => c.file).map(async c => {
    try {
      const r = await fetch(c.file);
      const d = await r.json();
      cityData[c.id] = d.map(p => ({...p, _city: c.id}));
    } catch(e) {
      cityData[c.id] = [];
    }
  });
  await Promise.all(promises);
  
  // Build tabs
  const tabsEl = document.getElementById('cityTabs');
  CITIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'city-tab' + (c.id === 'all' ? ' active' : '');
    const count = c.id === 'all' 
      ? Object.values(cityData).reduce((s, d) => s + d.length, 0)
      : (cityData[c.id] || []).length;
    btn.innerHTML = `${c.name}<span class="count">${count}</span>`;
    btn.dataset.city = c.id;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.city-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCity = c.id;
      render();
    });
    tabsEl.appendChild(btn);
  });
  
  document.getElementById('loading').style.display = 'none';
  render();
}

function getData() {
  if (currentCity === 'all') {
    return Object.values(cityData).flat();
  }
  return cityData[currentCity] || [];
}

function detectTags(p) {
  const tags = [];
  const text = ((p.bio || '') + ' ' + (p.luma_bio || '') + ' ' + (p.tw_bio || '')).toLowerCase();
  if (/founder|ceo|co-founder|cofounder|\bbuilding\b|started|my company|chief executive/.test(text)) tags.push('founder');
  if (/engineer|developer|\bswe\b|\bdev\b|coding|programmer|\bmle\b|ml engineer|software|backend|frontend|full.?stack|devops|infra/.test(text)) tags.push('engineer');
  if (/\bvc\b|venture|investor|\bgp\b|partner at|angel|fund |capital|seed stage|series [a-d]|portfolio/.test(text)) tags.push('vc');
  if (/design|ux |ui |product design|creative director|graphic|figma|brand design/.test(text)) tags.push('designer');
  if (/product manager|\bpm\b|product lead|head of product|product @|product at/.test(text)) tags.push('pm');
  if (/\bai\b|machine learning|\bml\b|deep learning|neural|llm|gpt|artificial intelligence|nlp|computer vision|diffusion|transformer/.test(text)) tags.push('ai');
  if (/crypto|web3|blockchain|defi|\bdao\b|solidity|ethereum|\beth\b|bitcoin|nft|onchain|on-chain|token/.test(text)) tags.push('crypto');
  if (/student|grad |undergrad|university|college|studying|@ nyu|@ columbia|@ cornell|@ mit|@ stanford|class of|phd candidate/.test(text)) tags.push('student');
  if (/marketing|growth|content|social media|brand |community|creator economy|influencer/.test(text)) tags.push('marketing');
  if (/research|scientist|professor|academic|phd|postdoc|lab /.test(text)) tags.push('research');
  return tags;
}

function formatFollowers(n) {
  if (!n) return '';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

const tagClasses = { founder:'tag-founder', engineer:'tag-engineer', vc:'tag-vc', designer:'tag-designer', student:'tag-student', pm:'tag-pm', ai:'tag-ai', crypto:'tag-crypto', marketing:'tag-marketing', research:'tag-research' };
const cityNames = { nyc:'NYC', austin:'Austin', telaviv:'Tel Aviv', miami:'Miami', london:'London', guadalajara:'GDL', rio:'Rio' };

function renderRow(p) {
  const tags = detectTags(p);
  const links = [];
  if (p.twitter) links.push(`<a href="https://x.com/${p.twitter}" target="_blank" title="@${p.twitter}">𝕏</a>`);
  if (p.linkedin) links.push(`<a href="https://linkedin.com${p.linkedin}" target="_blank" title="LinkedIn"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>`);
  if (p.instagram && p.instagram.toLowerCase() !== 'yes') links.push(`<a href="https://instagram.com/${p.instagram}" target="_blank" title="Instagram"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>`);
  if (p.website) links.push(`<a href="${p.website}" target="_blank" title="${p.website}">🔗</a>`);
  if (p.luma_url) links.push(`<a href="${p.luma_url}" target="_blank" title="Luma Profile"><svg width="14" height="14" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M29.5 14.5C21.5 14.5 15 8 15 0C15 8 8.5 14.5 0.5 14.5C8.5 14.5 15 21 15 29C15 21 21.5 14.5 29.5 14.5Z" fill="currentColor"/></svg></a>`);
  
  // Show both bios if different
  const twBio = p.tw_bio || '';
  const lumaBio = p.luma_bio || '';
  let bioHtml = '';
  if (twBio && lumaBio && twBio !== lumaBio) {
    bioHtml = `<div style="line-height:1.4"><span style="color:#333">${twBio}</span><br><span style="color:#999;font-size:11px;">Luma: ${lumaBio}</span></div>`;
  } else {
    bioHtml = twBio || lumaBio || '';
  }
  
  const verified = p.tw_verified ? ' <svg width="14" height="14" viewBox="0 0 22 22" style="vertical-align:-2px;margin-left:2px;"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.855-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.69-.13.635-.08 1.293.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.604-.274 1.26-.144 1.896.13.636.433 1.221.878 1.69.47.446 1.055.752 1.69.883.635.13 1.294.083 1.902-.141.27.587.7 1.086 1.24 1.44s1.167.551 1.813.568c.647-.017 1.277-.213 1.817-.567s.972-.854 1.245-1.44c.604.224 1.26.272 1.895.141.636-.13 1.22-.436 1.69-.882.445-.47.75-1.055.88-1.69.131-.636.083-1.293-.139-1.897.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.302 2.072 2.072 4.4-4.794 1.347 1.246z" fill="#1d9bf0"/></svg>' : '';
  const tagsHtml = tags.map(t => `<span class="tag ${tagClasses[t]}">${t}</span>`).join('');
  const followers = p.tw_followers ? `<span class="followers">${formatFollowers(p.tw_followers)}</span>` : '';
  const cityBadge = currentCity === 'all' && p._city ? `<span class="city-badge">${cityNames[p._city] || p._city}</span>` : '';
  
  return `<tr>
    <td class="name-cell">${p.name}${verified}${cityBadge}</td>
    <td class="bio-cell" style="white-space:normal;max-width:350px;" title="${(twBio||lumaBio).replace(/"/g,'&quot;')}">${bioHtml}</td>
    <td>${tagsHtml}</td>
    <td><div class="social-links">${links.join('')}</div></td>
    <td>${followers}</td>
  </tr>`;
}

function render() {
  let data = getData();
  
  let filtered = data.filter(p => {
    if (currentSearch) {
      const s = currentSearch.toLowerCase();
      const hay = (p.name + ' ' + (p.bio||'') + ' ' + (p.luma_bio||'') + ' ' + (p.tw_location||'') + ' ' + (p.twitter||'') + ' ' + (p.linkedin||'')).toLowerCase();
      if (!hay.includes(s)) return false;
    }
    const tags = detectTags(p);
    switch(currentFilter) {
      case 'has-twitter': return !!p.twitter;
      case 'has-linkedin': return !!p.linkedin;
      case 'has-bio': return !!(p.bio || p.luma_bio);
      case 'verified': return p.tw_verified;
      case 'founder': return tags.includes('founder');
      case 'engineer': return tags.includes('engineer');
      case 'vc': return tags.includes('vc');
      case 'designer': return tags.includes('designer');
      case 'pm': return tags.includes('pm');
      case 'ai': return tags.includes('ai');
      case 'crypto': return tags.includes('crypto');
      case 'student': return tags.includes('student');
      default: return true;
    }
  });
  
  if (currentSort === 'followers') {
    filtered.sort((a,b) => (b.tw_followers||0) - (a.tw_followers||0));
  } else {
    filtered.sort((a,b) => a.name.localeCompare(b.name));
  }
  
  document.getElementById('count').textContent = `Showing ${filtered.length} of ${data.length} attendees`;
  document.getElementById('tbody').innerHTML = filtered.slice(0, 500).map(renderRow).join('');
  if (filtered.length > 500) {
    document.getElementById('tbody').innerHTML += `<tr><td colspan="5" style="text-align:center;color:#888;padding:16px;">Showing first 500 of ${filtered.length} results. Use search to narrow down.</td></tr>`;
  }
  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';
  
  const withTw = data.filter(d => d.twitter).length;
  const withLi = data.filter(d => d.linkedin).length;
  const withBio = data.filter(d => d.bio || d.luma_bio).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${data.length.toLocaleString()}</div><div class="stat-label">Attendees</div></div>
    <div class="stat"><div class="stat-num">${withTw}</div><div class="stat-label">X/Twitter</div></div>
    <div class="stat"><div class="stat-num">${withLi}</div><div class="stat-label">LinkedIn</div></div>
    <div class="stat"><div class="stat-num">${withBio}</div><div class="stat-label">With Bio</div></div>
  `;
}

document.getElementById('search').addEventListener('input', e => { currentSearch = e.target.value; render(); });
document.getElementById('sort').addEventListener('change', e => { currentSort = e.target.value; render(); });
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('downloadCsv').addEventListener('click', () => {
  let data = getData();
  let filtered = data.filter(p => {
    if (currentSearch) {
      const s = currentSearch.toLowerCase();
      const hay = (p.name + ' ' + (p.bio||'') + ' ' + (p.luma_bio||'') + ' ' + (p.tw_location||'') + ' ' + (p.twitter||'') + ' ' + (p.linkedin||'')).toLowerCase();
      if (!hay.includes(s)) return false;
    }
    const tags = detectTags(p);
    switch(currentFilter) {
      case 'has-twitter': return !!p.twitter;
      case 'has-linkedin': return !!p.linkedin;
      case 'has-bio': return !!(p.bio || p.luma_bio);
      case 'verified': return p.tw_verified;
      case 'founder': return tags.includes('founder');
      case 'engineer': return tags.includes('engineer');
      case 'vc': return tags.includes('vc');
      case 'designer': return tags.includes('designer');
      case 'pm': return tags.includes('pm');
      case 'ai': return tags.includes('ai');
      case 'crypto': return tags.includes('crypto');
      case 'student': return tags.includes('student');
      default: return true;
    }
  });
  if (currentSort === 'followers') filtered.sort((a,b) => (b.tw_followers||0) - (a.tw_followers||0));
  else filtered.sort((a,b) => a.name.localeCompare(b.name));
  
  const esc = v => '"' + String(v||'').replace(/"/g,'""') + '"';
  const headers = ['Name','Bio','Twitter Bio','Luma Bio','Twitter','Followers','Verified','Location','LinkedIn','Instagram','Website','Luma Profile'];
  const rows = filtered.map(p => [
    esc(p.name), esc(p.bio), esc(p.tw_bio), esc(p.luma_bio),
    esc(p.twitter ? 'https://x.com/'+p.twitter : ''),
    p.tw_followers||'', p.tw_verified?'Yes':'',
    esc(p.tw_location),
    esc(p.linkedin ? 'https://linkedin.com'+p.linkedin : ''),
    esc(p.instagram && p.instagram.toLowerCase()!=='yes' ? 'https://instagram.com/'+p.instagram : ''),
    esc(p.website), esc(p.luma_url)
  ].join(','));
  
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const cityLabel = currentCity === 'all' ? 'all-cities' : currentCity;
  const filterLabel = currentFilter !== 'all' ? '-' + currentFilter : '';
  a.download = `clawcon-${cityLabel}${filterLabel}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// Dark mode toggle
const themeToggle = document.getElementById('themeToggle');
function setTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  themeToggle.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
themeToggle.addEventListener('click', () => {
  setTheme(!document.documentElement.classList.contains('dark'));
});
// Init from localStorage or system preference
const saved = localStorage.getItem('theme');
if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  setTheme(true);
}

loadAllData();
</script>
