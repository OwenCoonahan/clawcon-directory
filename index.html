<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawCon — Global Attendee Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Geist', -apple-system, sans-serif; background: #fafafa; color: #111; }
.container { max-width: 1280px; margin: 0 auto; padding: 24px; }
header { padding: 32px 0 24px; border-bottom: 1px solid #e5e5e5; margin-bottom: 24px; }
header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
header p { color: #666; margin-top: 6px; font-size: 15px; }
.city-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid #e5e5e5; overflow-x: auto; }
.city-tab { padding: 12px 20px; font-size: 14px; font-family: 'Geist', sans-serif; cursor: pointer; border: none; background: none; color: #888; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; white-space: nowrap; }
.city-tab:hover { color: #333; }
.city-tab.active { color: #111; border-bottom-color: #111; }
.city-tab .count { font-family: 'Geist Mono', monospace; font-size: 11px; color: #aaa; margin-left: 6px; }
.city-tab.active .count { color: #666; }
.stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.stat { background: white; border: 1px solid #e5e5e5; border-radius: 8px; padding: 10px 16px; }
.stat-num { font-size: 22px; font-weight: 700; font-family: 'Geist Mono', monospace; }
.stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search { flex: 1; min-width: 250px; padding: 10px 16px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 14px; font-family: 'Geist', sans-serif; outline: none; background: white; }
.search:focus { border-color: #111; }
.filter-btn { padding: 7px 14px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 12px; font-family: 'Geist', sans-serif; cursor: pointer; background: white; transition: all 0.15s; }
.filter-btn:hover { border-color: #111; }
.filter-btn.active { background: #111; color: white; border-color: #111; }
.sort-select { padding: 8px 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; font-family: 'Geist', sans-serif; background: white; cursor: pointer; }
.result-count { font-size: 13px; color: #888; margin-bottom: 12px; font-family: 'Geist Mono', monospace; }
table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
thead { background: #f9f9f9; }
th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; font-weight: 500; border-bottom: 1px solid #e5e5e5; user-select: none; }
td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover { background: #f9f9f9; }
.name-cell { font-weight: 500; white-space: nowrap; }
.bio-cell { color: #555; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.city-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; background: #f0f0f0; color: #666; margin-left: 6px; }
.social-links { display: flex; gap: 5px; }
.social-links a { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 4px; border: 1px solid #e5e5e5; color: #555; text-decoration: none; font-size: 11px; transition: all 0.15s; }
.social-links a:hover { border-color: #111; color: #111; }
.followers { font-family: 'Geist Mono', monospace; font-size: 12px; color: #888; }
.verified { color: #1d9bf0; font-size: 11px; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 500; margin: 1px 2px; }
.tag-founder { background: #f0f7ff; color: #0066cc; }
.tag-engineer { background: #f0fff4; color: #008844; }
.tag-vc { background: #fef3f0; color: #cc4400; }
.tag-designer { background: #f5f0ff; color: #6633cc; }
.tag-student { background: #fff8f0; color: #996600; }
.tag-pm { background: #f0ffff; color: #008888; }
.empty { text-align: center; padding: 40px; color: #888; }
.loading { text-align: center; padding: 40px; color: #888; }
@media (max-width: 768px) {
  .container { padding: 16px; }
  header h1 { font-size: 22px; }
  .bio-cell { max-width: 150px; }
  td, th { padding: 8px 10px; }
  .city-tab { padding: 10px 14px; font-size: 13px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>ClawCon — Global Attendee Directory</h1>
    <p>Presented by Kilo Code · Enriched data from Luma + Twitter</p>
  </header>
  
  <div class="city-tabs" id="cityTabs"></div>
  
  <div class="stats" id="stats"></div>
  
  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search by name, bio, company, location...">
    <select class="sort-select" id="sort">
      <option value="name">Sort: Name A→Z</option>
      <option value="followers">Sort: Followers ↓</option>
    </select>
  </div>
  
  <div class="controls" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="has-twitter">Twitter</button>
    <button class="filter-btn" data-filter="has-linkedin">LinkedIn</button>
    <button class="filter-btn" data-filter="has-bio">Has Bio</button>
    <button class="filter-btn" data-filter="verified">Verified ✓</button>
    <button class="filter-btn" data-filter="founder">Founders</button>
    <button class="filter-btn" data-filter="engineer">Engineers</button>
    <button class="filter-btn" data-filter="vc">VCs</button>
    <button class="filter-btn" data-filter="designer">Designers</button>
  </div>
  
  <div class="result-count" id="count"></div>
  
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Bio / Headline</th>
        <th>Tags</th>
        <th>Links</th>
        <th>Followers</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  
  <div class="empty" id="empty" style="display:none;">No attendees match your search.</div>
  <div class="loading" id="loading">Loading attendee data...</div>
</div>

<script>
const CITIES = [
  { id: 'all', name: 'All Cities', file: null },
  { id: 'nyc', name: 'NYC', file: 'data-nyc.json', date: 'Mar 5' },
  { id: 'austin', name: 'Austin', file: 'data-austin.json', date: 'Mar 12' },
  { id: 'telaviv', name: 'Tel Aviv', file: 'data-telaviv.json', date: 'Mar 18' },
  { id: 'miami', name: 'Miami', file: 'data-miami.json', date: 'Mar 25' },
  { id: 'london', name: 'London', file: 'data-london.json', date: 'Apr 8' },
  { id: 'guadalajara', name: 'Guadalajara', file: 'data-guadalajara.json', date: 'Apr 18' },
];

let cityData = {};
let currentCity = 'all';
let currentFilter = 'all';
let currentSort = 'name';
let currentSearch = '';

async function loadAllData() {
  const promises = CITIES.filter(c => c.file).map(async c => {
    try {
      const r = await fetch(c.file);
      const d = await r.json();
      cityData[c.id] = d.map(p => ({...p, _city: c.id}));
    } catch(e) {
      cityData[c.id] = [];
    }
  });
  await Promise.all(promises);
  
  // Build tabs
  const tabsEl = document.getElementById('cityTabs');
  CITIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'city-tab' + (c.id === 'all' ? ' active' : '');
    const count = c.id === 'all' 
      ? Object.values(cityData).reduce((s, d) => s + d.length, 0)
      : (cityData[c.id] || []).length;
    btn.innerHTML = `${c.name}<span class="count">${count}</span>`;
    btn.dataset.city = c.id;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.city-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCity = c.id;
      render();
    });
    tabsEl.appendChild(btn);
  });
  
  document.getElementById('loading').style.display = 'none';
  render();
}

function getData() {
  if (currentCity === 'all') {
    return Object.values(cityData).flat();
  }
  return cityData[currentCity] || [];
}

function detectTags(p) {
  const tags = [];
  const text = ((p.bio || '') + ' ' + (p.luma_bio || '')).toLowerCase();
  if (/founder|ceo|co-founder|cofounder|building|started|my company/.test(text)) tags.push('founder');
  if (/engineer|developer|swe|dev |coding|programmer|mle |ml engineer|software/.test(text)) tags.push('engineer');
  if (/\bvc\b|venture|investor|gp |partner at|angel|fund |capital/.test(text)) tags.push('vc');
  if (/design|ux |ui |product design|creative director/.test(text)) tags.push('designer');
  if (/student|grad |undergrad|university|college|@ nyu|@ columbia|@ cornell/.test(text)) tags.push('student');
  if (/product manager|pm |product lead|head of product/.test(text)) tags.push('pm');
  return tags;
}

function formatFollowers(n) {
  if (!n) return '';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

const tagClasses = { founder:'tag-founder', engineer:'tag-engineer', vc:'tag-vc', designer:'tag-designer', student:'tag-student', pm:'tag-pm' };
const cityNames = { nyc:'NYC', austin:'Austin', telaviv:'Tel Aviv', miami:'Miami', london:'London', guadalajara:'GDL' };

function renderRow(p) {
  const tags = detectTags(p);
  const links = [];
  if (p.twitter) links.push(`<a href="https://x.com/${p.twitter}" target="_blank" title="@${p.twitter}">𝕏</a>`);
  if (p.linkedin) links.push(`<a href="https://linkedin.com${p.linkedin}" target="_blank" title="LinkedIn">in</a>`);
  if (p.instagram && p.instagram.toLowerCase() !== 'yes') links.push(`<a href="https://instagram.com/${p.instagram}" target="_blank" title="Instagram">ig</a>`);
  if (p.website) links.push(`<a href="${p.website}" target="_blank" title="${p.website}">🔗</a>`);
  
  const bio = p.bio || p.luma_bio || '';
  const verified = p.tw_verified ? ' <span class="verified">✓</span>' : '';
  const tagsHtml = tags.map(t => `<span class="tag ${tagClasses[t]}">${t}</span>`).join('');
  const followers = p.tw_followers ? `<span class="followers">${formatFollowers(p.tw_followers)}</span>` : '';
  const cityBadge = currentCity === 'all' && p._city ? `<span class="city-badge">${cityNames[p._city] || p._city}</span>` : '';
  
  return `<tr>
    <td class="name-cell">${p.name}${verified}${cityBadge}</td>
    <td class="bio-cell" title="${bio.replace(/"/g,'&quot;')}">${bio}</td>
    <td>${tagsHtml}</td>
    <td><div class="social-links">${links.join('')}</div></td>
    <td>${followers}</td>
  </tr>`;
}

function render() {
  let data = getData();
  
  let filtered = data.filter(p => {
    if (currentSearch) {
      const s = currentSearch.toLowerCase();
      const hay = (p.name + ' ' + (p.bio||'') + ' ' + (p.luma_bio||'') + ' ' + (p.tw_location||'') + ' ' + (p.twitter||'') + ' ' + (p.linkedin||'')).toLowerCase();
      if (!hay.includes(s)) return false;
    }
    const tags = detectTags(p);
    switch(currentFilter) {
      case 'has-twitter': return !!p.twitter;
      case 'has-linkedin': return !!p.linkedin;
      case 'has-bio': return !!(p.bio || p.luma_bio);
      case 'verified': return p.tw_verified;
      case 'founder': return tags.includes('founder');
      case 'engineer': return tags.includes('engineer');
      case 'vc': return tags.includes('vc');
      case 'designer': return tags.includes('designer');
      default: return true;
    }
  });
  
  if (currentSort === 'followers') {
    filtered.sort((a,b) => (b.tw_followers||0) - (a.tw_followers||0));
  } else {
    filtered.sort((a,b) => a.name.localeCompare(b.name));
  }
  
  document.getElementById('count').textContent = `Showing ${filtered.length} of ${data.length} attendees`;
  document.getElementById('tbody').innerHTML = filtered.slice(0, 500).map(renderRow).join('');
  if (filtered.length > 500) {
    document.getElementById('tbody').innerHTML += `<tr><td colspan="5" style="text-align:center;color:#888;padding:16px;">Showing first 500 of ${filtered.length} results. Use search to narrow down.</td></tr>`;
  }
  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';
  
  const withTw = data.filter(d => d.twitter).length;
  const withLi = data.filter(d => d.linkedin).length;
  const withBio = data.filter(d => d.bio || d.luma_bio).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${data.length.toLocaleString()}</div><div class="stat-label">Attendees</div></div>
    <div class="stat"><div class="stat-num">${withTw}</div><div class="stat-label">Twitter</div></div>
    <div class="stat"><div class="stat-num">${withLi}</div><div class="stat-label">LinkedIn</div></div>
    <div class="stat"><div class="stat-num">${withBio}</div><div class="stat-label">With Bio</div></div>
  `;
}

document.getElementById('search').addEventListener('input', e => { currentSearch = e.target.value; render(); });
document.getElementById('sort').addEventListener('change', e => { currentSort = e.target.value; render(); });
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

loadAllData();
</script>
</body>
</html>
